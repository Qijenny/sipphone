name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          .buildozer
          ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libgstreamer1.0-dev \
          gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
          git zip unzip openjdk-17-jdk autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython pillow

    - name: Initialize Android SDK and accept licenses
      run: |
        # 下载 Android SDK command line tools
        cd $HOME
        if [ ! -d "android-sdk" ]; then
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-11076708_latest.zip
        fi
        
        export ANDROIDSDK="$HOME/android-sdk"
        export ANDROID_HOME="$ANDROIDSDK"
        export PATH="$PATH:$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools"
        
        # 接受所有许可证
        yes | sdkmanager --licenses
        
        echo "ANDROIDSDK=$ANDROIDSDK" >> $GITHUB_ENV
        echo "ANDROID_HOME=$ANDROIDSDK" >> $GITHUB_ENV

    - name: Build APK
      env:
        ANDROIDSDK: ${{ env.ANDROIDSDK }}
        ANDROID_HOME: ${{ env.ANDROIDSDK }}
      run: |
        export ANDROIDSDK="$ANDROIDSDK"
        export ANDROID_HOME="$ANDROIDSDK"
        export PATH="$PATH:$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools"
        
        # 让 buildozer 使用我们的 Android SDK
        export BUILDOZER_ANDROID_SDK_PATH="$ANDROIDSDK"
        
        buildozer android debug 2>&1 | tee build.log

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sipphone-debug
        path: bin/*.apk
        if-no-files-found: error
      if: always()
